<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord rédacteur — Civilisation ou Barbarie</title>
    <!-- Only dashboard CSS -->
    <link rel="stylesheet" href="/writer/workspace-9xK2mP/css/writer.css">
</head>
<body>

<div class="dashboard-container">
    <header class="dashboard-header">
        <h1>📖 Civilisation ou Barbarie</h1>
        <img src="/pictures/logo/Civilisation_ou_Barbarie_B1.png" alt="Logo" class="logo">
        <div id="writerInfo" class="writer-info"></div>
    </header>

    <div class="two-columns">
        <!-- LEFT COLUMN: FRENCH -->
        <div class="column french-column">
            <h2>🇫🇷 Article Progress</h2>
            <div id="frenchProgress" class="progress-container">
                <p class="no-article">Loading progress...</p>
            </div>

            <h2>📤 Upload Document</h2>
            <div class="upload-section">
                <h3>Télécharger un document</h3>
                <form id="frenchUploadForm">
                    <div class="form-row">
                        <label>Français</label>
                        <input type="file" id="frenchFile" accept=".pdf,.txt,.docx">
                    </div>
                    <div class="form-row">
                        <label>Sélectionner un article</label>
                        <select id="frenchArticleSelect">
                            <option value="">-- Chargement... --</option>
                        </select>
                    </div>
                    <button type="submit">Uploader en français</button>
                </form>
            </div>

            <h2>📄 Recent Documents</h2>
            <div id="frenchRecentDocuments" class="recent-docs">
                <p>Aucun document disponible</p>
            </div>
        </div>

        <!-- RIGHT COLUMN: ENGLISH -->
        <div class="column english-column">
            <h2>🇬🇧 Article Progress</h2>
            <div id="englishProgress" class="progress-container">
                <p class="no-article">Loading progress...</p>
            </div>

            <h2>📤 Upload Document</h2>
            <div class="upload-section">
                <h3>Upload document</h3>
                <form id="englishUploadForm">
                    <div class="form-row">
                        <label>English</label>
                        <input type="file" id="englishFile" accept=".pdf,.txt,.docx">
                    </div>
                    <div class="form-row">
                        <label>Select article</label>
                        <select id="englishArticleSelect">
                            <option value="">-- Loading... --</option>
                        </select>
                    </div>
                    <button type="submit">Upload in English</button>
                </form>
            </div>

            <h2>📄 Recent Documents</h2>
            <div id="englishRecentDocuments" class="recent-docs">
                <p>No documents available</p>
            </div>
        </div>
    </div>
</div>

<!-- Only dashboard JS -->
    <script src="/writer/workspace-9xK2mP/js/writer.js" defer></script>
</body>
</html>
