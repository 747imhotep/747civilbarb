<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact — Civilization or Barbarism</title>
<!-- Global foundation -->
  <link rel="stylesheet" href="/shared/cssshared/base.css">

<!-- Page-specific -->
  <link rel="stylesheet" href="/en/contact/css/contact.css">
  
<!-- Shared UI components -->
  <link rel="stylesheet" href="/navbar/cssnavbar/navbar.css">
  <link rel="stylesheet" href="/navbar/csssnippet/snippet.css">
  <link rel="stylesheet" href="/shared/cssshared/footer.css">

<!-- Overlays / fixed UI LAST -->
  <link rel="stylesheet" href="/shared/cssshared/gdpr.css">

<!-- Optional: Favicon -->
  <link rel="icon" href="/pictures/fav-icone/fav-icone03.png">
</head>
<!-- ============================ -->
<!--       CIVILBARB CONTACT      -->
<!-- ============================ -->

<body class="has-fixed-nav">

    <!-- Navigation Bar -->
<div id="navbar-placeholder"></div>

  
   <main class="contact-page">
  <!-- Contact header -->
  <header class="contact-header">
    <h1>Contact Us</h1>
  </header>

  <div class="contact-intro">
    <p>Your message interests us. Please complete the form below.</p>
  </div>

  <div class="contact-form">
    <form method="post" action="https://formspree.io/f/mkoqrerw">
      <label>Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>
      

      <label>Email</label>
      <input type="email" id="email" name="email" placeholder="Your email" required>
      
      <label>Message</label>
      <textarea id="message" name="message" placeholder="Your message" required></textarea>
      

      <label class="gdpr-consent">
      <input type="checkbox" name="gdpr" required>
      I agree to the <a href="/privacy/privacy.html">Privacy Policy</a>
      </label>

      <button type="submit" aria-label="Send contact form">Send message</button>
    </form>
    <p class="contact-note">We will respond within 48 hours.</p>
  </div>
</main>


<!-- GDPR Consent Banner -->
<div id="gdpr-banner" role="dialog" aria-live="polite" aria-modal="true">
  <p>
    This site uses strictly necessary cookies for its operation,
    as well as optional third-party services.
    You can accept or refuse non-essential cookies.
    <a href="/privacy/privacy.html">Learn more</a>
  </p>

  <div class="gdpr-actions">
    <button id="gdpr-accept">Accept</button>
    <button id="gdpr-refuse" class="secondary">Refuse</button>
  </div>
</div>
<!-- GDPR Consent Banner END -->

          


<!-- Footer -->
        <div id="footer-placeholder"></div>

        <script src="/navbar/jsnavbar/load-navbar.js" defer></script>
        <script src="/navbar/jsnavbar/navbar.js" defer></script>
        <script src="/shared/jsshared/gdpr.js" defer></script>
        <script src="/en/contact/js/jscontact.js" defer></script>
        <script src="/shared/jsfooter/load-footer.js" defer></script>
    </body>
</html>
